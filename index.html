<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini 極簡翻譯</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .active-glow { box-shadow: 0 0 15px rgba(56, 189, 248, 0.5); }
    </style>
</head>
<body class="flex flex-col min-h-screen p-4 font-sans">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold text-sky-400">Gemini 翻譯助手</h1>
        <input type="password" id="apiKey" placeholder="貼上 API Key" class="bg-slate-800 text-xs p-2 rounded border border-slate-700 w-32 focus:outline-none focus:border-sky-500">
    </div>

    <textarea id="inputText" placeholder="點擊輸入文字 (中/英/日/韓)..." 
        class="w-full h-40 bg-slate-800 rounded-xl p-4 mb-4 text-lg focus:outline-none focus:ring-2 focus:ring-sky-500 border border-slate-700"></textarea>

    <button onclick="startTranslation()" id="btnText"
        class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all mb-6">
        立刻翻譯並複製
    </button>

    <div class="flex-1">
        <p class="text-slate-400 text-sm mb-2">翻譯結果 (已自動複製)：</p>
        <div id="resultText" class="w-full min-h-[100px] bg-slate-900 rounded-xl p-4 text-xl border border-slate-800 break-words">
            ...
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-green-500 text-white px-6 py-2 rounded-full font-bold opacity-0 transition-opacity duration-300">
        已複製到剪貼簿！
    </div>

    <script>
        async function startTranslation() {
            const apiKey = document.getElementById('apiKey').value;
            const text = document.getElementById('inputText').value;
            const resultDiv = document.getElementById('resultText');
            const btnText = document.getElementById('btnText');

            if (!apiKey) return alert("請先輸入 Gemini API Key");
            if (!text) return;

            btnText.innerText = "翻譯中...";
            btnText.classList.add('animate-pulse');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `你是一個專業翻譯員。規則：1.輸入繁體中文則翻成英文。2.輸入日文、韓文、英文則翻成繁體中文。3.只輸出翻譯後的純文字結果，禁止任何解釋。輸入內容如下：\n${text}`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                const translated = data.candidates[0].content.parts[0].text.trim();
                
                // 顯示結果
                resultDiv.innerText = translated;
                
                // 自動複製
                await navigator.clipboard.writeText(translated);
                
                // 提示動畫
                showToast();
            } catch (error) {
                resultDiv.innerText = "出錯了，請檢查 Key 或網路";
                console.error(error);
            } finally {
                btnText.innerText = "立刻翻譯並複製";
                btnText.classList.remove('animate-pulse');
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }
    </script>
</body>
</html>
